<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hóa Đơn</title>
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body>

<div class="invoice-container">
    <h1>BẢNG HÓA ĐƠN</h1>
    
    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên Sản Phẩm</th>
                <th>Số Lượng</th>
                <th>Đơn Giá (VNĐ)</th>
                <th>Thành Tiền (VNĐ)</th>
            </tr>
        </thead>
       <tbody>
<tr>
    <td>1</td>
    <td>A</td>
    <td><input type="number" class="soluong" oninput="tinhTien()"></td>
    <td><input type="number" class="dongia" oninput="tinhTien()"></td>
    <td class="thanhtien">0</td>
</tr>

<tr>
    <td>2</td>
    <td>B</td>
    <td><input type="number" class="soluong" oninput="tinhTien()"></td>
    <td><input type="number" class="dongia" oninput="tinhTien()"></td>
    <td class="thanhtien">0</td>
</tr>

<tr>
    <td>3</td>
    <td>C</td>
    <td><input type="number" class="soluong" oninput="tinhTien()"></td>
    <td><input type="number" class="dongia" oninput="tinhTien()"></td>
    <td class="thanhtien">0</td>
</tr>

<tr>
    <td colspan="4">TỔNG THÀNH TIỀN</td>
    <td id="tong">0</td>
</tr>
</tbody>
</table>

<script>
function tinhTien() {
    let rows = document.querySelectorAll("tbody tr");
    let tong = 0;

    rows.forEach(row => {
        let soLuong = row.querySelector(".soluong");
        let donGia = row.querySelector(".dongia");
        let thanhTienCell = row.querySelector(".thanhtien");

        if (soLuong && donGia && thanhTienCell) {
            let sl = parseFloat(soLuong.value) || 0;
            let dg = parseFloat(donGia.value) || 0;
            let tt = sl * dg;

            thanhTienCell.innerText = tt;
            tong += tt;
        }
    });

    document.getElementById("tong").innerText = tong;
}
</script>

</body>
</html>
