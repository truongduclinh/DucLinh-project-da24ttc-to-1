<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký</title>
    <link rel="stylesheet" href="../css/style3.css">
</head>
<body>

<div class="container">

    <h2>Đăng Ký Tài Khoản Ở Đây Nè!</h2>

    <form action="#" method="post">

        <!-- Họ tên -->
        <label>Họ tên:</label>
        <input type="text" name="hoten">

        <!-- MSSV -->
        <label>MSSV:</label>
        <input type="text" name="mssv">

        <!-- Lớp -->
        <label>Lớp:</label>
        <select name="lop">
            <option value="">--Chọn lớp--</option>
            <option>DA24TTA</option>
            <option>DA24TTB</option>
            <option>DA24TTC</option>
            <option>DA24TTD</option>
        </select>

        <!-- Giới tính -->
        <label>Giới tính:</label>
        <div>
            <input type="radio" name="gioitinh"> Nam
            <input type="radio" name="gioitinh"> Nữ
        </div>

        <!-- Điểm mạnh -->
        <label>Điểm mạnh:</label>
        <div>
            <input type="checkbox"> Giải quyết vấn đề
            <input type="checkbox"> Lập trình
            <input type="checkbox"> Debug lỗi
        </div>
        <input type="text" placeholder="Khác...">

        <!-- Hình -->
        <label>Hình ảnh:</label>
        <input type="file">

        <!-- SĐT -->
        <label>Số điện thoại:</label>
        <input type="tel" placeholder="Nhập số điện thoại">

        <!-- Email -->
        <label>Email:</label>
        <input type="email">

        <!-- Nút -->
        <button type="submit">Đăng ký</button>
        <button type="reset">Nhập lại</button>

    </form>

</div>

</body>
</html>
