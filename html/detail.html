<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>

    <link rel="stylesheet" href="../css/style6.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="../js/lib.js"></script>
</head>

<body>

<div class="container py-4">
    <div id="detail"></div>
</div>

<script>
    let id = new URLSearchParams(window.location.search).get("id");

    let product = products.find(function(p){
        return p.id == id;
    });

    if(product){
        document.getElementById("detail").innerHTML =
            '<div class="detail-card card p-3 shadow">' +
                '<div class="detail-image-wrapper">' +
                    '<img src="' + product.image + '" class="detail-image img-fluid" alt="' + product.name + '">' +
                '</div>' +
                '<div class="detail-info">' +
                    '<h2>' + product.name + '</h2>' +
                    '<h4 class="text-danger">' + product.price + 'k</h4>' +
                    '<p class="detail-description">' + product.description + '</p>' +
                    '<div class="detail-actions">' +
                        '<button onclick="buy()" class="btn btn-primary">Mua ngay</button>' +
                        '<a href="page6.html" class="btn btn-secondary">Quay lại</a>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }
    else{
        document.getElementById("detail").innerHTML =
            '<div class="alert alert-warning">' +
                'Không tìm thấy sản phẩm' +
            '</div>';
    }

    function buy(){
        alert("Đã mua: " + product.name);
    }
</script>
